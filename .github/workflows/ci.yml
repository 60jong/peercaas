name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agents:
    name: Agents (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agents/go.mod
          cache-dependency-path: agents/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  platform-common:
    name: Platform / common
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :common:build -x test

      - name: Test
        run: ./gradlew :common:test

  platform-hub:
    name: Platform / hub
    runs-on: ubuntu-latest
    needs: platform-common
    defaults:
      run:
        working-directory: platform

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :hub:build -x test

      - name: Test
        run: ./gradlew :hub:test

  platform-engine:
    name: Platform / engine
    runs-on: ubuntu-latest
    needs: platform-common
    defaults:
      run:
        working-directory: platform

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew :engine:build -x test

      - name: Test
        run: ./gradlew :engine:test
