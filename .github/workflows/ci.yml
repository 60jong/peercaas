name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agents:
    name: Agents (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agents

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: agents/go.mod
          cache-dependency-path: agents/go.sum

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...

  platform:
    name: Platform (Java/Gradle)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -x test

      - name: Test
        run: ./gradlew test
