<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PeerCaaS - Client Dashboard</title>
  <link rel="stylesheet" th:href="@{/css/style.css}">
  <style>
    body { background: var(--bg-color); color: var(--text-main); font-family: 'Inter', sans-serif; font-size: 14px; padding: 24px; }
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .badge { padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; background: rgba(99,102,241,0.15); color: var(--secondary-color); }
    
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; padding: 20px; transition: all 0.3s; }
    .card:hover { border-color: rgba(0, 212, 170, 0.3); box-shadow: 0 0 20px var(--primary-glow); }
    .card-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; }
    .card-value { font-size: 28px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
    .tx { color: var(--primary-color); }
    .rx { color: var(--secondary-color); }

    .table-wrap { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th { padding: 12px 16px; background: var(--bg-elevated); font-size: 11px; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border-color); }
    td { padding: 12px 16px; border-bottom: 1px solid var(--border-color); font-size: 13px; color: var(--text-main); }

    .transport-badge { padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 600; }
    .t-webrtc { background: rgba(99,102,241,0.15); color: var(--secondary-color); }
    .t-relay { background: rgba(245,158,11,0.15); color: #f59e0b; }

    .waiting { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 80px 0; color: var(--text-muted); }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border-color); border-top-color: var(--primary-color); border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <span class="badge">Client Agent Overview</span>
    <span id="updated-time" style="margin-left: auto; font-size: 12px; color: var(--text-muted);">Connecting...</span>
  </div>

  <div class="cards">
    <div class="card"><div class="card-label">Total Tx</div><div class="card-value tx" id="s-tx">&mdash;</div></div>
    <div class="card"><div class="card-label">Total Rx</div><div class="card-value rx" id="s-rx">&mdash;</div></div>
    <div class="card"><div class="card-label">Containers</div><div class="card-value" id="s-containers">&mdash;</div></div>
    <div class="card"><div class="card-label">Connections</div><div class="card-value" id="s-conns">&mdash;</div></div>
  </div>

  <div id="table-area">
    <div class="waiting"><div class="spinner"></div><div style="font-weight: 600;">Connecting to Client Agent...</div></div>
  </div>

  <script th:inline="javascript">
    let clientKey = '';

    async function loadKey() {
        try {
            const token = localStorage.getItem('accessToken');
            const res = await fetch('/api/v1/member/me', { headers: { 'Authorization': `Bearer ${token}` } });
            const result = await res.json();
            clientKey = result.data.clientKey;
        } catch (e) {}
    }

    function fmtBytes(n) {
      n = Number(n) || 0;
      if (n >= 1073741824) return (n / 1073741824).toFixed(2) + ' GB';
      if (n >= 1048576)    return (n / 1048576).toFixed(2)    + ' MB';
      if (n >= 1024)       return (n / 1024).toFixed(1)       + ' KB';
      return n + ' B';
    }

    function render(snap) {
      const containers = snap.containers || [];
      let totalTx = 0, totalRx = 0, totalConns = 0;
      containers.forEach(c => { totalTx += c.txBytes || 0; totalRx += c.rxBytes || 0; totalConns += c.connCount || 0; });

      document.getElementById('s-tx').textContent = fmtBytes(totalTx);
      document.getElementById('s-rx').textContent = fmtBytes(totalRx);
      document.getElementById('s-containers').textContent = containers.length;
      document.getElementById('s-conns').textContent = totalConns;
      document.getElementById('updated-time').textContent = 'Last update: ' + new Date().toLocaleTimeString();

      const area = document.getElementById('table-area');
      if (containers.length === 0) {
        area.innerHTML = '<div class="waiting"><div>No active traffic reported.</div></div>';
        return;
      }

      const rows = containers.map(c => `
        <tr>
          <td style="font-family: 'JetBrains Mono', monospace;">${c.containerId}</td>
          <td><span class="transport-badge ${c.transport === 'webrtc' ? 't-webrtc' : 't-relay'}">${c.transport.toUpperCase()}</span></td>
          <td class="tx">${fmtBytes(c.txBytes)}</td>
          <td class="rx">${fmtBytes(c.rxBytes)}</td>
          <td>${c.connCount}</td>
        </tr>`).join('');

      area.innerHTML = `<div class="table-wrap"><table><thead><tr><th>Container ID</th><th>Transport</th><th>Tx</th><th>Rx</th><th>Conns</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }

    async function refresh() {
      if (!clientKey) return;
      try {
        const res = await fetch(`/api/v1/metrics/${encodeURIComponent(clientKey)}`);
        if (res.status === 404) return;
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        render(await res.json());
      } catch (e) {}
    }

    loadKey().then(() => {
        refresh();
        setInterval(refresh, 5000);
    });
  </script>
</body>
</html>
